[phases.setup]
nixPkgs = ["nodejs", "python311", "python311Packages.requests", "python311Packages.psycopg2"]

[phases.install]
cmds = [
    "npm ci",
    "python3.11 --version && echo 'Python 3.11 found' || (python3 --version && echo 'Python 3 found') || echo 'NO PYTHON FOUND'"
]

[start]
cmd = "node server.js"