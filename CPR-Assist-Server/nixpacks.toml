[phases.setup]
nixPkgs = [
  "nodejs",
  "python311",
  "python311Packages.requests",
  "python311Packages.urllib3",
  "python311Packages.psycopg2"
]

[phases.install]
cmds = [
  "npm ci",
  "PYTHONPATH=/root/.nix-profile/lib/python3.11/site-packages python3.11 -c \"import requests; import urllib3; import psycopg2; print('All Python deps OK')\""
]

[start]
cmd = "export PYTHONPATH=/root/.nix-profile/lib/python3.11/site-packages:$PYTHONPATH && node server.js"