[phases.setup]
nixPkgs = [
  "nodejs",
  "python311",
  "python311Packages.pip",
  "python311Packages.requests",
  "python311Packages.urllib3",
  "python311Packages.psycopg2",
  "python311Packages.idna",
  "python311Packages.certifi",
  "python311Packages.charset-normalizer"
]

[phases.install]
cmds = [
  "npm ci",
  "python3.11 -m pip install groq --break-system-packages",
  "PYTHONPATH=/root/.nix-profile/lib/python3.11/site-packages python3.11 -c \"import psycopg2; import groq; print('All Python deps OK')\""
]

[start]
cmd = "export PYTHONPATH=/root/.nix-profile/lib/python3.11/site-packages:$PYTHONPATH && node server.js"