import java.util.Properties

plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin" // Flutter plugin must be applied last
}

android {
    namespace 'com.roueva.cpr_assist'
    compileSdk = 36

    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
        freeCompilerArgs += [
                "-Xskip-metadata-version-check",
                "-Xjvm-default=all"
        ]
    }

    defaultConfig {
        applicationId = "com.roueva.cpr_assist"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 36
        versionCode = flutter.versionCode
        versionName = flutter.versionName

        def localProperties = new Properties()
        def localPropertiesFile = rootProject.file('local.properties')
        if (localPropertiesFile.exists()) {
            localPropertiesFile.withReader('UTF-8') { reader -> localProperties.load(reader) }
        }
        manifestPlaceholders["GOOGLE_MAPS_API_KEY"] =
                localProperties.getProperty('GOOGLE_MAPS_API_KEY') ?:
                        System.getenv("GOOGLE_MAPS_API_KEY") ?: ""
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug // Use proper release signing for production
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    configurations.all {
        resolutionStrategy {
            force 'androidx.core:core:1.13.1'
            force 'androidx.core:core-ktx:1.13.1'
        }
    }
}

flutter {
    source = "../.."
}


dependencies {
    implementation 'javax.annotation:javax.annotation-api:1.3.2'
    implementation 'com.google.errorprone:error_prone_annotations:2.48.0'
}